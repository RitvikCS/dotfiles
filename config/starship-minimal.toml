"$schema" = 'https://starship.rs/config-schema.json'

# Catppuccin Mocha, blue accent — matches the desktop (waybar/rofi/borders).
# Deliberately NO literal nerd/PUA glyphs in this file: module symbols come from
# starship's built-in defaults, so editors can't strip them (rofi PUA lesson).
# Prompt chars ❯ ❮ are plain unicode (U+276F/U+276E), safe.

format = """
$directory$git_branch$git_status$python$nodejs$rust$golang$c$java$docker_context$cmd_duration
$character"""

add_newline = true
palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
blue = '#89b4fa'
sapphire = '#74c7ec'
lavender = '#b4befe'
mauve = '#cba6f7'
green = '#a6e3a1'
yellow = '#f9e2af'
peach = '#fab387'
red = '#f38ba8'
text = '#cdd6f4'
subtext = '#a6adc8'
overlay = '#6c7086'

[directory]
style = 'bold blue'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = true
read_only = ' [ro]'
format = '[$path]($style)[$read_only]($read_only_style) '

[git_branch]
style = 'sapphire'
format = '[$symbol$branch]($style) '

[git_status]
style = 'peach'
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2000
style = 'overlay'
format = '[took $duration]($style) '

[character]
success_symbol = '[❯](bold blue)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'
vimcmd_replace_one_symbol = '[❮](bold mauve)'
vimcmd_replace_symbol = '[❮](bold mauve)'
vimcmd_visual_symbol = '[❮](bold yellow)'

# Language contexts: only shown inside relevant projects; keep them quiet.
[python]
style = 'yellow'
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
style = 'green'
format = '[$symbol($version )]($style)'

[rust]
style = 'peach'
format = '[$symbol($version )]($style)'

[golang]
style = 'sapphire'
format = '[$symbol($version )]($style)'

[c]
style = 'lavender'
format = '[$symbol($version )]($style)'

[java]
style = 'red'
format = '[$symbol($version )]($style)'

[docker_context]
style = 'sapphire'
format = '[$symbol$context]($style) '
