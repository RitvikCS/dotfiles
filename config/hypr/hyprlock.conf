# ─────────────────────────────────────────────────────────────
# Hyprlock · sharp wallpaper, serif clock w/ date below,
# login card (avatar + user, password field, hint)
# ─────────────────────────────────────────────────────────────

$clockfont = Bebas Neue
$uifont    = Adwaita Sans

$white   = rgba(ffffffee)
$dimmed  = rgba(ffffffb8)
$faint   = rgba(ffffff88)
$card    = rgba(1a1a2ea8)
$ink     = rgb(1e1e2e)
$red     = rgb(f38ba8)
$green   = rgb(a6e3a1)

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/csrit/Pictures/wallpapers/wall4.jpg
    blur_passes = 0
}

# ── Clock (top) ──────────────────────────────────────────────

label {
    monitor =
    text = $TIME
    color = $white
    font_size = 160
    font_family = $clockfont
    position = 0, -85
    halign = center
    valign = top
}

# ── Date (below the clock) ───────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $dimmed
    font_size = 19
    font_family = $uifont
    position = 0, -330
    halign = center
    valign = top
}

# ─────────────────────────────────────────────────────────────
# Login card (slightly below center)
# Card center is (0, -70) — every element below is placed
# relative to that. Username is display-only: hyprlock always
# authenticates the session user (csrit) via PAM.
# ─────────────────────────────────────────────────────────────

shape {
    monitor =
    size = 380, 240
    rounding = 22
    color = $card
    border_size = 1
    border_color = rgba(ffffff22)
    position = 0, -70
    halign = center
    valign = center
}

# avatar (white rounded square + person glyph)
shape {
    monitor =
    size = 54, 54
    rounding = 14
    color = rgba(ffffffe6)
    position = -135, -5
    halign = center
    valign = center
}

label {
    monitor =
    text = 󰀄
    color = $ink
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = -135, -5
    halign = center
    valign = center
}

# username, to the right of the avatar
label {
    monitor =
    text = $USER
    color = $white
    font_size = 18
    font_family = $uifont Bold
    position = -62, -5
    halign = center
    valign = center
}

# "Password:" label above the field
label {
    monitor =
    text = Password:
    color = $dimmed
    font_size = 13
    font_family = $uifont
    position = -128, -60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 310, 42
    rounding = 10
    outline_thickness = 1

    outer_color = rgba(ffffff55)
    inner_color = rgba(ffffff1c)
    font_color = $white
    font_family = $uifont

    placeholder_text =
    fail_text = wrong password
    fail_color = $red
    check_color = $green

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    fade_on_empty = false

    position = 0, -100
    halign = center
    valign = center
}

# hint at the bottom of the card
label {
    monitor =
    text = Enter password to unlock
    color = $faint
    font_size = 11
    font_family = $uifont
    position = 0, -155
    halign = center
    valign = center
}
